# ─── OVNI AI Nginx Configuration ─────────────────────────────
# Copy to /etc/nginx/sites-available/ovni-ai on the EC2 instance
# Then: sudo ln -sf /etc/nginx/sites-available/ovni-ai /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# After Certbot SSL setup, this file will be modified automatically.

# Rate limiting zone for provisioning
limit_req_zone $binary_remote_addr zone=provision:10m rate=3r/m;

# HTTP → HTTPS redirect (uncomment after SSL is set up)
# server {
#     listen 80;
#     server_name YOUR_DOMAIN;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl;  # Uncomment after Certbot
    server_name YOUR_DOMAIN;

    # SSL (Certbot will add these lines automatically)
    # ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Max body size (for file uploads if needed)
    client_max_body_size 10M;

    # ── API Backend ──────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support (critical for /v1/chat?stream=true)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Provisioning rate limit ──────────────────────────────
    location = /api/provision {
        limit_req zone=provision burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Stripe Webhook (raw body needed) ─────────────────────
    location = /webhooks/stripe {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Stripe-Signature $http_stripe_signature;
    }

    # ── Static frontend assets (optional: serve from Nginx) ──
    # Uncomment and configure if serving built frontend from Nginx
    # location /dashboard/ {
    #     alias /opt/ovni-ai/dashboard/dist/;
    #     try_files $uri $uri/ /dashboard/index.html;
    # }
    # location /portal/ {
    #     alias /opt/ovni-ai/portal/dist/;
    #     try_files $uri $uri/ /portal/index.html;
    # }
    # location /wizard/ {
    #     alias /opt/ovni-ai/wizard/dist/;
    #     try_files $uri $uri/ /wizard/index.html;
    # }
}
